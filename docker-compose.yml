services:
  postgres:
    image: postgres:16-alpine
    container_name: skyn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skyn}
      POSTGRES_USER: ${POSTGRES_USER:-skynapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skynapi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - skynapi_postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - ./migrations:/migrations:ro
    networks:
      - skynapi_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    build:
      context: ./caddy
    image: skyn-caddy:latest
    container_name: skyn_caddy
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - skynapi_net
    depends_on:
      - skynapi

  skynapi:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: skynapi:latest
    container_name: skynapi
    restart: unless-stopped
    environment:
      # DB_URL uses key=value DSN format — required when the password contains
      # characters that are special in URLs (e.g. > * @).
      DB_URL: ${DB_URL:-host=postgres dbname=skyn user=skynapi password=skynapi sslmode=disable}
      SERVER_PORT: ${SERVER_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - skynapi_net
    depends_on:
      postgres:
        condition: service_healthy

networks:
  skynapi_net:

volumes:
  skynapi_postgres_data:
